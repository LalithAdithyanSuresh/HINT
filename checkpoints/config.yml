MODE: 1             # 1: train, 2: test
MODEL: 2            # 2: inpaint model
USE_LANDMARKS: 1    # 1: Turn LaFIn on!
USE_AMP: 1          # 1: Enable Automatic Mixed Precision (Optimized for RTX 5000)
SYMMETRY_LOSS_WEIGHT: 10.0    # Symmetry architecture architecture loss weight
MASK: 3             # 0: no mask, 1: random block, 2: center mask, 3: external, 4: 50% external, 50% random block, 5: 50% no mask
SEED: 10            # random seed
GPU: [0]            # list of gpu ids
AUGMENTATION_TRAIN: 1 # use augmentation for better symmetry training

TRAIN_INPAINT_IMAGE_FLIST: ./dataset/celeba_train.flist
VAL_INPAINT_IMAGE_FLIST: ./dataset/celeba_val.flist
TEST_INPAINT_IMAGE_FLIST: ./dataset/celeba_test.flist

TRAIN_LANDMARK_LANDMARK_FLIST: ./dataset/celeba_train_landmarks.flist
VAL_LANDMARK_LANDMARK_FLIST: ./dataset/celeba_val_landmarks.flist
TEST_LANDMARK_LANDMARK_FLIST: ./dataset/celeba_test_landmarks.flist

TRAIN_MASK_FLIST: ./dataset/masks_train.flist
TEST_MASK_FLIST: ./dataset/masks_test.flist

LR: 0.0001                    # learning rate
D2G_LR: 0.1                   # discriminator/generator learning rate ratio
BETA1: 0.9                    # adam optimizer beta1
BETA2: 0.999                  # adam optimizer beta2
WD: 0
LR_Decay: 1

BATCH_SIZE: 16                # Optimized for RTX 5000 (24GB VRAM)
INPUT_SIZE: 256
MAX_ITERS: 2000000

L1_LOSS_WEIGHT: 1             # l1 loss weight
STYLE_LOSS_WEIGHT: 250        # style loss weight
CONTENT_LOSS_WEIGHT: 0.1      # perceptual loss weight
INPAINT_ADV_LOSS_WEIGHT: 0.01 # adversarial loss weight

GAN_LOSS: lsgan               # nsgan | lsgan | hinge
GAN_POOL_SIZE: 0              # fake images pool size

SAVE_INTERVAL: 1000           # auto-save model
EVAL_INTERVAL: 0              
LOG_INTERVAL: 10              # Frequent logging for visibility
VERBOSE: 1                    # Show extra stats in progbar
